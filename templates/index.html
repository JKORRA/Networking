<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN Twin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="/static/socket.io.min.js"></script>
    <script type="text/javascript" src="/static/vis-network.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glow-low: #22c55e;
            --glow-med: #eab308;
            --glow-high: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        .bg-mesh {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.05) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        header {
            position: relative;
            z-index: 10;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--glow-low);
            box-shadow: 0 0 10px var(--glow-low);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            grid-template-rows: 1fr 200px;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 60px);
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }

        .network-wrapper {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            position: relative;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            background: transparent;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            outline: none;
        }

        .network-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            padding: 0;
        }

        .icon-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .side-stats {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .stat-value.pink {
            color: var(--accent-pink);
        }

        .stat-value.total {
            color: #f8fafc;
        }

        .details-panel {
            grid-column: 3 / 4;
            grid-row: 1 / 2;
        }

        .details-content {
            font-size: 0.9rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .details-content p {
            margin: 5px 0;
        }

        .details-content strong {
            color: var(--accent-blue);
        }

        .flows-panel {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .logs-panel {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .custom-table th,
        .custom-table td {
            text-align: left;
            padding: 6px;
            border-bottom: 1px solid var(--glass-border);
        }

        .custom-table th {
            color: var(--text-muted);
            font-weight: 600;
        }

        .custom-table-container {
            overflow-y: auto;
            flex-grow: 1;
        }

        .log-entries {
            overflow-y: auto;
            flex-grow: 1;
            font-size: 0.85rem;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-entry {
            margin: 0;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .log-time {
            color: var(--text-muted);
            margin-right: 8px;
        }

        .log-add {
            color: var(--glow-low);
        }

        .log-remove {
            color: var(--glow-high);
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <header>
        <h1>
            <div class="pulse-dot" id="status-dot"></div> Real Time Dashboard
        </h1>
    </header>

    <div class="main-container">
        <div class="side-stats panel">
            <h3>Overview</h3>
            <div class="glass-card">
                <div class="stat-label">Switches</div>
                <div class="stat-value" id="stat-switches">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Hosts</div>
                <div class="stat-value pink" id="stat-hosts">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Traffic Rx</div>
                <div class="stat-value total" id="stat-traffic">0 <span
                        style="font-size: 1rem; color: var(--text-muted);">Mbps</span></div>
            </div>

            <div style="margin-top:auto">
                <h4 style="margin: 0 0 10px; font-size: 0.85rem; color: var(--text-muted);">Legend</h4>
                <div style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--glow-low);"></div> &lt;
                    40% Util
                </div>
                <div style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--glow-med);"></div> 40% -
                    80% Util
                </div>
                <div style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--glow-high);"></div>
                    &gt; 80% Util
                </div>
            </div>
        </div>

        <div class="network-wrapper">
            <div id="mynetwork"></div>
            <div class="network-controls">
                <button class="icon-btn" id="btn-zoom-in" title="Zoom In">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
                <button class="icon-btn" id="btn-zoom-out" title="Zoom Out">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                    </svg>
                </button>
                <button class="icon-btn" id="btn-fit" title="Fit to Screen">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zm6 10h2v6h-6v-2h4v-4zM4 14h2v4h4v2H4v-6z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="details-panel panel">
            <h3>Interactive Details</h3>
            <div class="details-content" id="details-content">
                <p style="color: var(--text-muted); font-style: italic;">Click a node/edge!</p>
            </div>
        </div>

        <div class="flows-panel panel">
            <h3>Active Flows Map</h3>
            <div class="custom-table-container">
                <table class="custom-table" id="flows-table">
                    <thead>
                        <tr>
                            <th>Src IP</th>
                            <th>Dst IP</th>
                            <th>Mbps</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--text-muted);">No active flows</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="logs-panel panel">
            <h3>Event Log</h3>
            <div class="log-entries" id="log-entries">
                <div class="log-entry"><span class="log-time">Now</span> System started.</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        const socket = io();

        const svgSwitch = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect x="10" y="30" width="80" height="40" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/><circle cx="25" cy="50" r="4" fill="#38bdf8"/><circle cx="40" cy="50" r="4" fill="#38bdf8"/><circle cx="55" cy="50" r="4" fill="#38bdf8"/><circle cx="70" cy="50" r="4" fill="#38bdf8"/></svg>`);
        const svgHost = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect x="30" y="20" width="40" height="60" rx="3" fill="#1e293b" stroke="#f472b6" stroke-width="3"/><circle cx="40" cy="65" r="3" fill="#f472b6"/></svg>`);

        var nodes = new vis.DataSet();
        var edges = new vis.DataSet();
        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };

        var options = {
            nodes: {
                shape: 'image',
                size: 30,
                font: { size: 12, color: '#f8fafc', face: 'Inter', background: 'rgba(15,23,42,0.7)' },
                chosen: false
            },
            edges: {
                width: 3,
                smooth: { type: 'dynamic' },
                chosen: false
            },
            physics: {
                solver: 'repulsion',
                repulsion: {
                    centralGravity: 0.1,
                    springLength: 150,
                    springConstant: 0.05,
                    nodeDistance: 180,
                    damping: 0.09
                },
                stabilization: {
                    enabled: true,
                    iterations: 500
                }
            },
            interaction: {
                hover: false,
                dragView: true,
                zoomView: true,
                zoomSpeed: 0.8
            }
        };
        var network = new vis.Network(container, data, options);
        let latestData = null;
        let initialFitDone = false;

        // Constrain Zoom
        network.on("zoom", function (params) {
            const minScale = 0.4;
            const maxScale = 2.5;
            if (params.scale < minScale) {
                network.moveTo({ scale: minScale });
            } else if (params.scale > maxScale) {
                network.moveTo({ scale: maxScale });
            }
        });

        // Network Control Buttons
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            const currentScale = network.getScale();
            network.moveTo({ scale: Math.min(2.5, currentScale * 1.5), animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
        });
        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            const currentScale = network.getScale();
            network.moveTo({ scale: Math.max(0.4, currentScale / 1.5), animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
        });
        document.getElementById('btn-fit').addEventListener('click', () => {
            network.fit({ animation: false });
            let currentScale = network.getScale();
            network.moveTo({ scale: currentScale * 0.85, animation: { duration: 500, easingFunction: "easeInOutQuad" } });
        });

        // Auto-fit network when layout stabilizes
        network.on("stabilizationIterationsDone", function () {
            if (!initialFitDone) {
                // Delay fit slightly to ensure final node coordinates are fully rendered
                setTimeout(() => {
                    network.fit({ animation: false });
                    let currentScale = network.getScale();
                    network.moveTo({ scale: currentScale * 0.85, animation: { duration: 800, easingFunction: "easeInOutQuad" } });
                }, 100);
                initialFitDone = true;
            }
        });

        network.on("click", function (params) {
            const detailsContent = document.getElementById("details-content");
            if (!latestData) return;

            // Reset all nodes and edges shadows
            let resetNodes = nodes.get().map(n => ({ id: n.id, shadow: { enabled: false } }));
            let resetEdges = edges.get().map(e => ({ id: e.id, shadow: { enabled: false } }));
            if (resetNodes.length > 0) nodes.update(resetNodes);
            if (resetEdges.length > 0) edges.update(resetEdges);

            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                nodes.update({ id: nodeId, shadow: { enabled: true, color: '#eab308', size: 25, x: 0, y: 0 } });

                if (nodeId.startsWith('s')) {
                    const dpid = nodeId.substring(1);
                    const sw = latestData.topology.switches[dpid];
                    let ports = sw ? sw.ports.join(", ") : "N/A";
                    let trafficHTML = "";
                    if (latestData.traffic[dpid]) {
                        for (let p in latestData.traffic[dpid]) {
                            trafficHTML += `<li>Port ${p}: RX ${latestData.traffic[dpid][p].rx_mbps} Mbps</li>`;
                        }
                    }
                    detailsContent.innerHTML = `<p><strong>Type:</strong> Switch</p><p><strong>DPID:</strong> ${dpid}</p><p><strong>Ports:</strong> ${ports}</p>
                        <hr style="border:0; border-bottom:1px solid var(--glass-border); margin: 10px 0;"><p><strong>Traffic Activity:</strong></p>
                        <ul style="padding-left: 20px; font-size: 0.8rem; color: var(--text-muted);">${trafficHTML || '<li>None</li>'}</ul>`;
                } else if (nodeId.startsWith('h')) {
                    const mac = nodeId.substring(1);
                    const host = latestData.topology.hosts[mac];
                    detailsContent.innerHTML = `<p><strong>Type:</strong> Host</p><p><strong>MAC:</strong> ${host.mac}</p><p><strong>IPv4:</strong> ${host.ipv4 || "Unknown"}</p><p><strong>Switch:</strong> s${host.dpid} (Port ${host.port})</p>`;
                }
            } else if (params.edges.length > 0) {
                const edgeId = params.edges[0];
                edges.update({ id: edgeId, shadow: { enabled: true, color: '#eab308', size: 15, x: 0, y: 0 } });

                const edge = edges.get(edgeId);
                detailsContent.innerHTML = `<p><strong>Type:</strong> Link</p><p><strong>From:</strong> ${edge.from}</p><p><strong>To:</strong> ${edge.to}</p><p><strong>Throughput:</strong> ${edge.label || '0 Mbps'}</p>`;
            } else {
                detailsContent.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">Click a node/edge!</p>';
            }
        });

        socket.on('update_data', function (msg) {
            try {
                latestData = msg;
                document.getElementById('status-dot').style.backgroundColor = 'var(--glow-low)';
                document.getElementById('status-dot').style.boxShadow = '0 0 10px var(--glow-low)';

                let newNodes = [], newEdges = [], topo = msg.topology, traffic = msg.traffic;
                let switchCount = 0, hostCount = 0, totalTraffic = 0.0;

                for (let dpid in topo.switches) { switchCount++; newNodes.push({ id: 's' + dpid, label: 's' + dpid, image: svgSwitch }); }

                for (let mac in topo.hosts) {
                    let host = topo.hosts[mac];
                    if (!mac.startsWith("00:00") && !mac.startsWith("02:00")) continue;
                    let cSw = topo.switches[host.dpid];
                    if (!cSw || !cSw.ports.includes(host.port)) continue;

                    hostCount++;
                    let ip = host.ipv4 && host.ipv4 !== "None" ? host.ipv4 : '10.0.0.' + parseInt(mac.substring(15), 16);
                    newNodes.push({ id: 'h' + mac, label: ip, image: svgHost });

                    let rx = 0;
                    if (traffic && traffic[host.dpid] && traffic[host.dpid][host.port]) {
                        rx += traffic[host.dpid][host.port].rx_mbps || 0;
                        rx += traffic[host.dpid][host.port].tx_mbps || 0;
                    }
                    totalTraffic += rx;

                    let max_capacity = 10; // Host links are 10 Mbps
                    let percentage = (rx / max_capacity) * 100;
                    
                    let ec = '#22c55e', w = 2;
                    if (percentage > 80) { ec = '#ef4444'; w = 5; } else if (percentage >= 40) { ec = '#eab308'; w = 3; }
                    
                    let labelText = rx.toFixed(1) + ' Mbps';
                    if (rx > 0) labelText += ' (' + percentage.toFixed(0) + '%)';
                    
                    newEdges.push({ id: 'e_h' + mac, from: 'h' + mac, to: 's' + host.dpid, color: { color: ec, hover: ec, highlight: '#eab308' }, width: w, label: labelText, font: { align: 'horizontal', color: ec, strokeWidth: 2, size: 10, face: 'Inter' } });
                }

                let linkMap = {};
                if (topo.links) topo.links.forEach((l) => {
                    let min_id = Math.min(l.src_dpid, l.dst_dpid), max_id = Math.max(l.src_dpid, l.dst_dpid);
                    let edgeId = 'e_s' + min_id + '_s' + max_id;
                    let rx = 0;
                    if (traffic && traffic[l.src_dpid] && traffic[l.src_dpid][l.src_port]) {
                        rx += traffic[l.src_dpid][l.src_port].rx_mbps || 0; rx += traffic[l.src_dpid][l.src_port].tx_mbps || 0;
                    }
                    if (!linkMap[edgeId]) linkMap[edgeId] = { rx: rx, from: 's' + min_id, to: 's' + max_id };
                    else linkMap[edgeId].rx += rx;
                });

                Object.keys(linkMap).forEach(edgeId => {
                    let l = linkMap[edgeId]; totalTraffic += l.rx;
                    let max_capacity = 100; // Switch backbone links are 100 Mbps
                    let percentage = (l.rx / max_capacity) * 100;
                    
                    let ec = '#22c55e', w = 2;
                    if (percentage > 80) { ec = '#ef4444'; w = 5; } else if (percentage >= 40) { ec = '#eab308'; w = 3; }
                    
                    let labelText = l.rx.toFixed(1) + ' Mbps';
                    if (l.rx > 0) labelText += ' (' + percentage.toFixed(0) + '%)';
                    
                    newEdges.push({ id: edgeId, from: l.from, to: l.to, color: { color: ec, hover: ec, highlight: '#eab308' }, width: w, label: labelText, font: { align: 'horizontal', color: ec, strokeWidth: 2, size: 10, face: 'Inter' } });
                });

                // Diff-based updates: only add/remove/update changed items
                let existingNodeIds = new Set(nodes.getIds());
                let newNodeIds = new Set(newNodes.map(n => n.id));

                let nodesToRemove = [...existingNodeIds].filter(id => !newNodeIds.has(id));
                if (nodesToRemove.length > 0) nodes.remove(nodesToRemove);

                let nodesToAdd = newNodes.filter(n => !existingNodeIds.has(n.id));
                if (nodesToAdd.length > 0) nodes.add(nodesToAdd);

                let nodesToUpdate = newNodes.filter(n => existingNodeIds.has(n.id));
                if (nodesToUpdate.length > 0) nodes.update(nodesToUpdate);

                let existingEdgeIds = new Set(edges.getIds());
                let newEdgeIds = new Set(newEdges.map(e => e.id));

                let edgesToRemove = [...existingEdgeIds].filter(id => !newEdgeIds.has(id));
                if (edgesToRemove.length > 0) edges.remove(edgesToRemove);

                let edgesToAdd = newEdges.filter(e => !existingEdgeIds.has(e.id));
                if (edgesToAdd.length > 0) edges.add(edgesToAdd);

                let edgesToUpdate = newEdges.filter(e => existingEdgeIds.has(e.id));
                if (edgesToUpdate.length > 0) edges.update(edgesToUpdate);

                document.getElementById('stat-switches').innerText = switchCount;
                document.getElementById('stat-hosts').innerText = hostCount;
                document.getElementById('stat-traffic').innerHTML = totalTraffic.toFixed(2) + ' <span style="font-size: 1rem; color: var(--text-muted);">Mbps</span>';

                const tbody = document.querySelector("#flows-table tbody");
                const fragment = document.createDocumentFragment();
                let hasFlows = false;
                for (let src in msg.flows) {
                    for (let dst in msg.flows[src]) {
                        hasFlows = true;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${src}</td><td>${dst}</td><td>${msg.flows[src][dst].toFixed(2)}</td>`;
                        fragment.appendChild(tr);
                    }
                }
                if (!hasFlows) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">No active flows</td></tr>';
                } else {
                    tbody.replaceChildren(fragment);
                }
            } catch (e) {
                console.error("Error drawing topology: ", e);
            }
        });

        socket.on('event_logs', function (logs) {
            const logsContainer = document.getElementById("log-entries");
            logs.forEach(log => {
                const colorClass = log.action === 'add' ? 'log-add' : 'log-remove';
                const entry = document.createElement('div');
                entry.className = 'log-entry';

                const timeSpan = document.createElement('span');
                timeSpan.className = 'log-time';
                timeSpan.textContent = `[${log.timestamp}] `;

                const msgSpan = document.createElement('span');
                msgSpan.className = colorClass;
                msgSpan.textContent = log.message;

                entry.appendChild(timeSpan);
                entry.appendChild(msgSpan);
                logsContainer.appendChild(entry);
            });
            logsContainer.scrollTop = logsContainer.scrollHeight;
        });

        socket.on('status', function (msg) {
            if (msg.error) {
                document.getElementById('status-dot').style.backgroundColor = 'var(--glow-high)';
                document.getElementById('status-dot').style.boxShadow = '0 0 10px var(--glow-high)';
            }
        });
    </script>
</body>

</html>
