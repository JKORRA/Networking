<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN Twin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="/static/socket.io.min.js"></script>
    <script type="text/javascript" src="/static/vis-network.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b101e;
            --glass-bg: rgba(15, 23, 42, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glow-low: #22c55e;
            --glow-med: #eab308;
            --glow-high: #ef4444;
            --panel-radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Animated Dark Background */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(244, 114, 182, 0.05) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
            animation: breathe 10s infinite alternate;
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Fullscreen Network Container */
        #mynetwork {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            outline: none;
        }

        /* Floating Panels Container */
        .floating-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to network */
        }

        /* Panel Common Styles */
        .panel {
            pointer-events: auto; /* Enable clicks inside panels */
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--panel-radius);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            padding: 20px;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.5s ease-out backwards;
            transition: transform 0.3s ease, border-color 0.3s ease, height 0.3s ease;
        }
        
        .panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Collapse Mechanism */
        .panel-header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }
        
        .panel-header-wrap h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .collapse-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s, transform 0.3s;
        }
        .panel-header-wrap:hover .collapse-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .panel-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
            transition: opacity 0.3s ease, max-height 0.3s ease;
            max-height: 400px;
            opacity: 1;
        }

        .panel.collapsed .panel-content {
            max-height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
            flex-grow: 0;
        }
        .panel.collapsed .panel-header-wrap {
            margin-bottom: 0;
        }
        .panel.collapsed .collapse-btn {
            transform: rotate(180deg);
        }
        
        .panel-header .panel-header-wrap { cursor: default; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Positioning */
        .panel-header {
            position: absolute;
            top: 25px; left: 25px;
            width: 280px;
            animation-delay: 0.1s;
        }

        .panel-details {
            position: absolute;
            top: 25px; right: 25px;
            width: 280px;
            animation-delay: 0.2s;
        }

        .panel-flows {
            position: absolute;
            bottom: 25px; left: 25px;
            width: 350px;
            height: 250px;
            animation-delay: 0.3s;
        }

        .panel-logs {
            position: absolute;
            bottom: 25px; right: 25px;
            width: 320px;
            height: 250px;
            animation-delay: 0.4s;
        }
        
        .panel-flows.collapsed, .panel-logs.collapsed, .panel-details.collapsed {
            height: auto;
        }

        .network-controls {
            position: absolute;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 8px 12px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out backwards;
            animation-delay: 0.5s;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-card.full-width {
            grid-column: 1 / -1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Buttons */
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-blue);
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        /* Tables & Scrollbars */
        .custom-table-container, .log-entries {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .custom-table th, .custom-table td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-table tr {
            transition: background 0.2s ease;
        }

        .custom-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .custom-table th {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Logs */
        .log-entries {
            font-size: 0.85rem;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-entry {
            margin: 0;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            border-left: 3px solid transparent;
            transition: transform 0.2s ease;
        }
        
        .log-entry:hover {
            transform: translateX(2px);
        }

        .log-entry.add { border-left-color: var(--glow-low); }
        .log-entry.remove { border-left-color: var(--glow-high); }

        .log-time { color: var(--text-muted); margin-right: 8px; }
        .log-add { color: var(--glow-low); }
        .log-remove { color: var(--glow-high); }

        /* Header / Logo */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--glow-low);
            box-shadow: 0 0 10px var(--glow-low);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        
        .details-content {
            font-size: 0.9rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .details-content p {
            margin: 8px 0;
            font-size: 0.9rem;
        }
        .details-content strong {
            color: var(--accent-blue);
            display: inline-block;
            width: 80px;
        }
        
        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .legend-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div id="mynetwork"></div>

    <div class="floating-ui">
        
        <!-- Top Left: Overview (Not collapsible) -->
        <div class="panel panel-header">
            <header>
                <div class="pulse-dot" id="status-dot"></div>
                <h1>SDN Twin</h1>
            </header>
            
            <div class="panel-content" style="margin-top:0;">
                <div class="stats-grid" style="margin-top:0;">
                    <div class="stat-card">
                        <div class="stat-label">Switches</div>
                        <div class="stat-value" style="color: var(--accent-blue);" id="stat-switches">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Hosts</div>
                        <div class="stat-value" style="color: var(--accent-pink);" id="stat-hosts">0</div>
                    </div>
                    <div class="stat-card full-width">
                        <div class="stat-label">Total Traffic Rx</div>
                        <div class="stat-value" id="stat-traffic">0.00 <span style="font-size: 1rem; color: var(--text-muted);">Mbps</span></div>
                    </div>
                </div>
                
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                    <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px;">Link Utilization Legend</div>
                    <div class="legend-row"><div class="legend-dot" style="background: var(--glow-low);"></div> &lt; 40% Capacity</div>
                    <div class="legend-row"><div class="legend-dot" style="background: var(--glow-med);"></div> 40% - 80% Capacity</div>
                    <div class="legend-row"><div class="legend-dot" style="background: var(--glow-high);"></div> &gt; 80% Capacity</div>
                </div>
            </div>
        </div>

        <!-- Top Right: Details -->
        <div class="panel panel-details collapsed" id="panel-details">
            <div class="panel-header-wrap" onclick="togglePanel('panel-details')">
                <h3>Interactive Details</h3>
                <button class="collapse-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            </div>
            <div class="panel-content">
                <div class="details-content" id="details-content">
                    <div style="display:flex; align-items:center; justify-content:center; height: 100px; color: var(--text-muted); font-style: italic;">
                        Click a node or edge to inspect
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Left: Active Flows -->
        <div class="panel panel-flows collapsed" id="panel-flows">
            <div class="panel-header-wrap" onclick="togglePanel('panel-flows')">
                <h3>Active Flows Map</h3>
                <button class="collapse-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            </div>
            <div class="panel-content">
                <div class="custom-table-container">
                    <table class="custom-table" id="flows-table">
                        <thead>
                            <tr>
                                <th>Src IP</th>
                                <th>Dst IP</th>
                                <th>Bandwidth</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 20px;">No active flows</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Bottom Right: Logs -->
        <div class="panel panel-logs" id="panel-logs">
            <div class="panel-header-wrap" onclick="togglePanel('panel-logs')">
                <h3>Event Log</h3>
                <button class="collapse-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            </div>
            <div class="panel-content">
                <div class="log-entries" id="log-entries">
                    <div class="log-entry add"><span class="log-time">Now</span> <span class="log-add">System started.</span></div>
                </div>
            </div>
        </div>

        <!-- Bottom Center: Controls -->
        <div class="network-controls">
            <button class="icon-btn" id="btn-zoom-in" title="Zoom In">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </button>
            <button class="icon-btn" id="btn-fit" title="Fit to Screen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zm6 10h2v6h-6v-2h4v-4zM4 14h2v4h4v2H4v-6z" />
                </svg>
            </button>
            <button class="icon-btn" id="btn-zoom-out" title="Zoom Out">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                </svg>
            </button>
        </div>
    </div>

    <script type="text/javascript">
        function togglePanel(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        const socket = io();

        // High quality modern SVG icons
        // Switch: layered server rack style
        const svgSwitch = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <rect x="15" y="25" width="70" height="50" rx="8" fill="#0b101e" stroke="#38bdf8" stroke-width="5"/>
                <line x1="15" y1="41" x2="85" y2="41" stroke="#38bdf8" stroke-width="3"/>
                <line x1="15" y1="58" x2="85" y2="58" stroke="#38bdf8" stroke-width="3"/>
                <circle cx="28" cy="33" r="3" fill="#38bdf8"/><circle cx="40" cy="33" r="3" fill="#38bdf8"/><circle cx="52" cy="33" r="3" fill="#38bdf8"/>
                <circle cx="28" cy="50" r="3" fill="#38bdf8"/><circle cx="40" cy="50" r="3" fill="#38bdf8"/><circle cx="52" cy="50" r="3" fill="#38bdf8"/>
                <circle cx="28" cy="67" r="3" fill="#38bdf8"/><circle cx="40" cy="67" r="3" fill="#38bdf8"/><circle cx="52" cy="67" r="3" fill="#38bdf8"/>
                <circle cx="72" cy="50" r="5" fill="#22c55e"/>
            </svg>
        `);
        // Host: modern laptop/desktop style
        const svgHost = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <rect x="25" y="25" width="50" height="35" rx="4" fill="#0b101e" stroke="#f472b6" stroke-width="5"/>
                <polygon points="15,65 85,65 75,70 25,70" fill="#0b101e" stroke="#f472b6" stroke-width="5" stroke-linejoin="round"/>
                <rect x="42" y="60" width="16" height="5" fill="#f472b6"/>
                <circle cx="50" cy="42" r="6" fill="#f472b6" opacity="0.3"/>
            </svg>
        `);

        var nodes = new vis.DataSet();
        var edges = new vis.DataSet();
        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };

        var options = {
            nodes: {
                shape: 'image',
                size: 35, // slightly larger
                font: { 
                    size: 14, 
                    color: '#ffffff', 
                    face: 'Inter',
                    bold: { color: '#ffffff', size: 14, vadjust: 0, mod: 'bold' },
                    strokeWidth: 4,     // Solid outline for readability
                    strokeColor: '#0b101e' // Dark background color to create sharp contrast
                },
                chosen: {
                    node: function(values, id, selected, hovering) {
                        values.size = 40;
                        values.shadow = true;
                        values.shadowColor = '#eab308';
                        values.shadowSize = 20;
                    }
                }
            },
            edges: {
                width: 3,
                smooth: { type: 'dynamic' },
                chosen: {
                    edge: function(values, id, selected, hovering) {
                        values.width = 5;
                        values.shadow = true;
                        values.shadowColor = '#eab308';
                        values.shadowSize = 15;
                    }
                }
            },
            physics: {
                solver: 'repulsion',
                repulsion: {
                    centralGravity: 0.05,
                    springLength: 100,
                    springConstant: 0.05,
                    nodeDistance: 120,
                    damping: 0.09
                },
                stabilization: {
                    enabled: true,
                    iterations: 500
                }
            },
            interaction: {
                hover: false,
                dragView: true,
                zoomView: true,
                zoomSpeed: 0.3
            }
        };
        var network = new vis.Network(container, data, options);
        let latestData = null;
        let initialFitDone = false;

        network.on("zoom", function (params) {
            const minScale = 0.5;
            const maxScale = 3.0;
            if (params.scale < minScale) {
                network.moveTo({ scale: minScale });
            } else if (params.scale > maxScale) {
                network.moveTo({ scale: maxScale });
            }
        });

        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            const currentScale = network.getScale();
            network.moveTo({ scale: Math.min(3.0, currentScale * 1.3), animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
        });
        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            const currentScale = network.getScale();
            network.moveTo({ scale: Math.max(0.5, currentScale / 1.3), animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
        });
        document.getElementById('btn-fit').addEventListener('click', () => {
            network.fit({ animation: { duration: 500, easingFunction: "easeInOutQuad" } });
        });

        network.on("stabilizationIterationsDone", function () {
            if (!initialFitDone) {
                setTimeout(() => {
                    network.fit({ animation: { duration: 800, easingFunction: "easeInOutQuad" } });
                }, 100);
                initialFitDone = true;
            }
        });

        network.on("click", function (params) {
            const detailsPanel = document.getElementById("panel-details");
            const detailsContent = document.getElementById("details-content");
            if (!latestData) return;

            if (params.nodes.length > 0) {
                // Auto-expand details panel on click
                detailsPanel.classList.remove('collapsed');
                
                const nodeId = params.nodes[0];
                if (nodeId.startsWith('s')) {
                    const dpid = nodeId.substring(1);
                    const sw = latestData.topology.switches[dpid];
                    let ports = sw ? sw.ports.join(", ") : "N/A";
                    let trafficHTML = "";
                    if (latestData.traffic[dpid]) {
                        for (let p in latestData.traffic[dpid]) {
                            trafficHTML += `<li>Port ${p}: RX ${latestData.traffic[dpid][p].rx_mbps} Mbps</li>`;
                        }
                    }
                    detailsContent.innerHTML = `<p><strong>Type:</strong> Switch</p><p><strong>DPID:</strong> ${dpid}</p><p><strong>Ports:</strong> ${ports}</p>
                        <hr style="border:0; border-bottom:1px solid var(--glass-border); margin: 15px 0;"><p><strong>Traffic Activity:</strong></p>
                        <ul style="padding-left: 20px; font-size: 0.85rem; color: var(--text-muted); margin-top:5px;">${trafficHTML || '<li>None</li>'}</ul>`;
                } else if (nodeId.startsWith('h')) {
                    const mac = nodeId.substring(1);
                    const host = latestData.topology.hosts[mac];
                    detailsContent.innerHTML = `<p><strong>Type:</strong> Host</p><p><strong>MAC:</strong> ${host.mac}</p><p><strong>IPv4:</strong> ${host.ipv4 || "Unknown"}</p><p><strong>Switch:</strong> s${host.dpid} (Port ${host.port})</p>`;
                }
            } else if (params.edges.length > 0) {
                detailsPanel.classList.remove('collapsed');
                const edgeId = params.edges[0];
                const edge = edges.get(edgeId);
                detailsContent.innerHTML = `<p><strong>Type:</strong> Link</p><p><strong>From:</strong> ${edge.from}</p><p><strong>To:</strong> ${edge.to}</p><p><strong>Throughput:</strong> ${edge.label || '0 Mbps'}</p>`;
            }
        });

        socket.on('update_data', function (msg) {
            try {
                latestData = msg;
                document.getElementById('status-dot').style.backgroundColor = 'var(--glow-low)';
                document.getElementById('status-dot').style.boxShadow = '0 0 10px var(--glow-low)';

                let newNodes = [], newEdges = [], topo = msg.topology, traffic = msg.traffic;
                let switchCount = 0, hostCount = 0, totalTraffic = 0.0;

                for (let dpid in topo.switches) { 
                    switchCount++; 
                    newNodes.push({ 
                        id: 's' + dpid, 
                        label: '<b>s' + dpid + '</b>', 
                        image: svgSwitch,
                        font: { multi: 'html' } 
                    }); 
                }

                for (let mac in topo.hosts) {
                    let host = topo.hosts[mac];
                    if (!mac.startsWith("00:00") && !mac.startsWith("02:00")) continue;
                    let cSw = topo.switches[host.dpid];
                    if (!cSw || !cSw.ports.includes(host.port)) continue;

                    hostCount++;
                    let ip = host.ipv4 && host.ipv4 !== "None" ? host.ipv4 : '10.0.0.' + parseInt(mac.substring(15), 16);
                    newNodes.push({ 
                        id: 'h' + mac, 
                        label: '<b>' + ip + '</b>', 
                        image: svgHost,
                        font: { multi: 'html' }
                    });

                    let rx = 0;
                    if (traffic && traffic[host.dpid] && traffic[host.dpid][host.port]) {
                        rx += traffic[host.dpid][host.port].rx_mbps || 0;
                        rx += traffic[host.dpid][host.port].tx_mbps || 0;
                    }
                    totalTraffic += rx;

                    let max_capacity = 10; // Host links are 10 Mbps
                    let percentage = (rx / max_capacity) * 100;
                    
                    let ec = '#22c55e', w = 2;
                    if (percentage > 80) { ec = '#ef4444'; w = 5; } else if (percentage >= 40) { ec = '#eab308'; w = 3; }
                    
                    let labelText = rx.toFixed(1) + ' Mbps';
                    if (rx > 0) labelText += ' (' + percentage.toFixed(0) + '%)';
                    
                    newEdges.push({ id: 'e_h' + mac, from: 'h' + mac, to: 's' + host.dpid, color: { color: ec, hover: ec, highlight: '#eab308' }, width: w, label: labelText, font: { align: 'horizontal', color: ec, strokeWidth: 3, strokeColor: '#0b101e', size: 11, face: 'Inter', multi: 'html' } });
                }

                let linkMap = {};
                if (topo.links) topo.links.forEach((l) => {
                    let min_id = Math.min(l.src_dpid, l.dst_dpid), max_id = Math.max(l.src_dpid, l.dst_dpid);
                    let edgeId = 'e_s' + min_id + '_s' + max_id;
                    let rx = 0;
                    if (traffic && traffic[l.src_dpid] && traffic[l.src_dpid][l.src_port]) {
                        rx += traffic[l.src_dpid][l.src_port].rx_mbps || 0; rx += traffic[l.src_dpid][l.src_port].tx_mbps || 0;
                    }
                    if (!linkMap[edgeId]) linkMap[edgeId] = { rx: rx, from: 's' + min_id, to: 's' + max_id };
                    else linkMap[edgeId].rx += rx;
                });

                Object.keys(linkMap).forEach(edgeId => {
                    let l = linkMap[edgeId]; totalTraffic += l.rx;
                    let max_capacity = 100; // Switch backbone links are 100 Mbps
                    let percentage = (l.rx / max_capacity) * 100;
                    
                    let ec = '#22c55e', w = 2;
                    if (percentage > 80) { ec = '#ef4444'; w = 5; } else if (percentage >= 40) { ec = '#eab308'; w = 3; }
                    
                    let labelText = l.rx.toFixed(1) + ' Mbps';
                    if (l.rx > 0) labelText += ' (' + percentage.toFixed(0) + '%)';
                    
                    newEdges.push({ id: edgeId, from: l.from, to: l.to, color: { color: ec, hover: ec, highlight: '#eab308' }, width: w, label: labelText, font: { align: 'horizontal', color: ec, strokeWidth: 3, strokeColor: '#0b101e', size: 11, face: 'Inter', multi: 'html' } });
                });

                let existingNodeIds = new Set(nodes.getIds());
                let newNodeIds = new Set(newNodes.map(n => n.id));

                let nodesToRemove = [...existingNodeIds].filter(id => !newNodeIds.has(id));
                if (nodesToRemove.length > 0) nodes.remove(nodesToRemove);

                let nodesToAdd = newNodes.filter(n => !existingNodeIds.has(n.id));
                if (nodesToAdd.length > 0) nodes.add(nodesToAdd);

                let nodesToUpdate = newNodes.filter(n => existingNodeIds.has(n.id));
                if (nodesToUpdate.length > 0) nodes.update(nodesToUpdate);

                let existingEdgeIds = new Set(edges.getIds());
                let newEdgeIds = new Set(newEdges.map(e => e.id));

                let edgesToRemove = [...existingEdgeIds].filter(id => !newEdgeIds.has(id));
                if (edgesToRemove.length > 0) edges.remove(edgesToRemove);

                let edgesToAdd = newEdges.filter(e => !existingEdgeIds.has(e.id));
                if (edgesToAdd.length > 0) edges.add(edgesToAdd);

                let edgesToUpdate = newEdges.filter(e => existingEdgeIds.has(e.id));
                if (edgesToUpdate.length > 0) edges.update(edgesToUpdate);

                document.getElementById('stat-switches').innerText = switchCount;
                document.getElementById('stat-hosts').innerText = hostCount;
                document.getElementById('stat-traffic').innerHTML = totalTraffic.toFixed(2) + ' <span style="font-size: 1rem; color: var(--text-muted);">Mbps</span>';

                const tbody = document.querySelector("#flows-table tbody");
                const fragment = document.createDocumentFragment();
                let hasFlows = false;
                for (let src in msg.flows) {
                    for (let dst in msg.flows[src]) {
                        if (msg.flows[src][dst] > 0) {
                            hasFlows = true;
                            const tr = document.createElement('tr');
                            tr.innerHTML = `<td>${src}</td><td>${dst}</td><td>${msg.flows[src][dst].toFixed(2)}</td>`;
                            fragment.appendChild(tr);
                        }
                    }
                }
                if (!hasFlows) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted); padding: 20px;">No active flows</td></tr>';
                } else {
                    tbody.replaceChildren(fragment);
                }
            } catch (e) {
                console.error("Error drawing topology: ", e);
            }
        });

        socket.on('event_logs', function (logs) {
            const logsContainer = document.getElementById("log-entries");
            logs.forEach(log => {
                const actionClass = log.action === 'add' ? 'add' : 'remove';
                const textClass = log.action === 'add' ? 'log-add' : 'log-remove';
                const entry = document.createElement('div');
                entry.className = `log-entry ${actionClass}`;

                const timeSpan = document.createElement('span');
                timeSpan.className = 'log-time';
                timeSpan.textContent = `[${log.timestamp}]`;

                const msgSpan = document.createElement('span');
                msgSpan.className = textClass;
                msgSpan.textContent = log.message;

                entry.appendChild(timeSpan);
                entry.appendChild(msgSpan);
                logsContainer.appendChild(entry);
            });
            logsContainer.scrollTop = logsContainer.scrollHeight;
        });

        socket.on('status', function (msg) {
            if (msg.error) {
                document.getElementById('status-dot').style.backgroundColor = 'var(--glow-high)';
                document.getElementById('status-dot').style.boxShadow = '0 0 10px var(--glow-high)';
            }
        });
    </script>
</body>

</html>
